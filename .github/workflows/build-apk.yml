name: 🔨 Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────────
  # 编译 Debug APK
  # ─────────────────────────────────────────────
  build-debug:
    name: 🛠 Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 赋予 Gradle 执行权限
        working-directory: DouyinVoiceApp
        run: chmod +x gradlew

      - name: 🗂 Gradle 依赖缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🏗 编译 Debug APK
        working-directory: DouyinVoiceApp
        run: ./gradlew assembleDebug --no-daemon

      - name: 📤 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: DouyinVoiceApp/app/build/outputs/apk/debug/*.apk

  # ─────────────────────────────────────────────
  # 编译签名 Release APK（仅 tag 触发）
  # ─────────────────────────────────────────────
  build-release:
    name: 🚀 Build Signed Release APK
    runs-on: ubuntu-latest
    needs: build-debug
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 赋予 Gradle 执行权限
        working-directory: DouyinVoiceApp
        run: chmod +x gradlew

      - name: 🗂 Gradle 依赖缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🔐 还原签名 Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > DouyinVoiceApp/app/release.jks

      - name: 🏗 编译 Release APK
        working-directory: DouyinVoiceApp
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_FILE:           release.jks
          KEYSTORE_PASSWORD:       ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:               ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:           ${{ secrets.KEY_PASSWORD }}

      - name: 🧹 删除 Keystore
        if: always()
        run: rm -f DouyinVoiceApp/app/release.jks

      - name: 📤 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: DouyinVoiceApp/app/build/outputs/apk/release/*.apk

      - name: 🏷 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "抖音语音助手 ${{ github.ref_name }}"
          body: |
            ## 📦 抖音语音替换助手

            ### 安装说明
            1. 设备需要已 Root（推荐 Magisk）
            2. 安装 APK 并授予 Root / 悬浮窗权限
            3. 启动 APP → 选择替换音频 → 保存并启动悬浮窗
            4. 打开抖音，录制语音后**不要发送**，点击悬浮窗替换即可
          files: |
            DouyinVoiceApp/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
